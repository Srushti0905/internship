<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Dashboard Task</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background-color: #f4f4f9; }
        .container { width: 80%; max-width: 800px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select { padding: 10px; margin-bottom: 20px; font-size: 16px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📊 Monthly Sales Dashboard</h2>
        
        <label for="yearSelect">Select Year:</label>
        <select id="yearSelect">
            <option value="2023">2023</option>
            <option value="2024" selected>2024</option>
            <option value="2025">2025</option>
        </select>

        <canvas id="salesChart"></canvas>
    </div>

    <script>
        // Global variable to hold the chart instance
        let myChart = null;

        // --- 1. Function to Fetch Data (Async/Await) ---
        async function fetchData(year) {
            try {
                // Call the FastAPI backend
                const response = await fetch(`http://127.0.0.1:8000/api/sales?year=${year}`);
                
                // Error handling if API fails (e.g., 404 or 500)
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Parse JSON response
                const data = await response.json();
                return data;

            } catch (error) {
                console.error("Error fetching data:", error);
                alert("Failed to load data. Check console for details.");
            }
        }

        // --- 2. Function to Render/Update Chart ---
        async function updateChart(year) {
            const data = await fetchData(year);
            
            if (!data) return; // Stop if fetch failed

            const ctx = document.getElementById('salesChart').getContext('2d');

            // If chart already exists, destroy it before creating a new one
            // (This is a common "gotcha" in Chart.js!)
            if (myChart) {
                myChart.destroy();
            }

            // Create new Chart
            myChart = new Chart(ctx, {
                type: 'bar', // Change to 'line' or 'pie' to experiment
                data: {
                    labels: data.labels, // ["Jan", "Feb"...] from backend
                    datasets: [{
                        label: `Sales for ${year}`,
                        data: data.values,   // [10, 20...] from backend
                        backgroundColor: 'rgba(54, 162, 235, 0.6)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // --- 3. Event Listeners & DOM Manipulation ---
        
        // Initial load
        document.addEventListener('DOMContentLoaded', () => {
            const yearSelect = document.getElementById('yearSelect');
            updateChart(yearSelect.value); // Load default year

            // Listen for changes on the dropdown
            yearSelect.addEventListener('change', (event) => {
                updateChart(event.target.value);
            });
        });

    </script>
</body>
</html>
